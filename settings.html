<!DOCTYPE html>
<html>

<head>
    <title>Settings - Chopsticks Hub</title>
    <script src="theme.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <h1>⚙️ Settings</h1>

    <p>Customize your experience.</p>

    <a href="index.html" class="back-button">
        Back to Home
    </a>

</header>

<div class="container">

    <div class="card">

        <h2>🎨 Theme</h2>
    
        <div class="theme-row">

    <div class="theme-text">

        <h3>Theme</h3>

        <span id="themeName">🌙 Dark</span>

    </div>

    <label class="theme-switch">

        <input
            type="checkbox"
            id="themeToggle"
        >

        <span class="switch">

            <span class="sun">

                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1.5" x2="12" y2="4"/>
                    <line x1="12" y1="20" x2="12" y2="22.5"/>
                    <line x1="1.5" y1="12" x2="4" y2="12"/>
                    <line x1="20" y1="12" x2="22.5" y2="12"/>
                    <line x1="4.2" y1="4.2" x2="6" y2="6"/>
                    <line x1="18" y1="18" x2="19.8" y2="19.8"/>
                    <line x1="18" y1="6" x2="19.8" y2="4.2"/>
                    <line x1="4.2" y1="19.8" x2="6" y2="18"/>
                </svg>

            </span>

            <span class="moon">

                <svg viewBox="0 0 24 24">
                    <path d="M21 13.3A8.8 8.8 0 1110.7 3 7.2 7.2 0 0021 13.3z"/>
                    <path d="M17.7 4.4l.4 1.2 1.2.4-1.2.4-.4 1.2-.4-1.2-1.2-.4 1.2-.4z"/>
                    <path d="M20.6 7.3l.2.7.7.2-.7.2-.2.7-.2-.7-.7-.2.7-.2z"/>
                </svg>

            </span>

            <span class="knob"></span>

        </span>

    </label>

</div>
    
    
    </div>
    
</div>

<script src="settings.js"></script>

</body>

</html>
