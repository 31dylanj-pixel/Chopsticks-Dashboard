<!DOCTYPE html>
<html>

<head>
    <title>Settings - Chopsticks Hub</title>
    <script src="theme.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <h1>⚙️ Settings</h1>

    <p>Customize your experience.</p>

    <a href="index.html" class="back-button">
        Back to Home
    </a>

</header>

<div class="container">

    <div class="card">

        <h2>🎨 Theme</h2>
    
        <div class="theme-row">

            <div class="theme-info">
        
                <h3>Theme</h3>
        
                <p id="themeName">
                    Dark Mode
                </p>
        
            </div>
        
            <label class="theme-switch">
        
                <input
                    type="checkbox"
                    id="themeToggle"
                >
        
                <span class="track">
        
                    <span class="thumb">
        
                        <span class="thumb-icon">🌙</span>
        
                    </span>
        
                </span>
        
            </label>
        
        </div>
            
    
    </div>
    
</div>

<script src="settings.js"></script>

</body>

</html>
